name: 🕐 Financial News Scraper

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper every 60s (x5)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "=== Round $i ==="
            python scraper/fetch_sina.py || echo "[WARN] scraper failed, skipping"

            git add docs/data.json scraper/news.db
            if git diff --cached --quiet; then
              echo "No changes."
            else
              git commit -m "data: round $i [$(date -u '+%H:%M:%S UTC')]"
              git push
            fi

            [ $i -lt 5 ] && sleep 60
          done
