<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24HR MKT NEWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #080810;
    --surface:      #0f0f1a;
    --border:       #1c1c2e;
    --border-bright:#2a2a40;
    --gold:         #c9a84c;
    --gold-dim:     #8a6e30;
    --text:         #e2e0d8;
    --muted:        #5a5a72;
    --green:        #4cc97a;
    --panel-w:      380px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(8,8,16,.94);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: 52px;
    display: flex; align-items: center;
    padding: 0 1.25rem; gap: 1rem;
  }
  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: .85rem; font-weight: 500;
    letter-spacing: .14em; color: var(--gold); flex-shrink: 0;
  }
  .wordmark em { color: var(--muted); font-style: normal; }
  .updated {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; color: var(--muted);
    letter-spacing: .04em; margin-left: auto;
  }
  .pulse {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--green);
    margin-right: 5px; animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── LAYOUT ── */
  .layout {
    display: flex; align-items: flex-start;
    position: relative; z-index: 1;
  }

  /* ── LEFT: NEWS ── */
  .news-col {
    flex: 1; min-width: 0;
    border-right: 1px solid var(--border);
  }

  .filter-wrap {
    position: sticky; top: 52px; z-index: 99;
    background: rgba(8,8,16,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: .55rem 1.25rem;
    display: flex; flex-wrap: wrap; gap: .35rem; align-items: center;
  }
  .cat-btn {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; letter-spacing: .04em;
    padding: .28rem .7rem;
    border: 1px solid var(--border-bright); border-radius: 2px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s;
  }
  .cat-btn:hover { color: var(--text); border-color: var(--gold-dim); }
  .cat-btn.active { background: var(--gold); color: #080810; border-color: var(--gold); font-weight: 500; }

  .time-pills { display: flex; gap: .25rem; align-items: center; margin-left: auto; }
  .time-pill {
    font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .06em;
    padding: .22rem .6rem;
    border: 1px solid var(--border-bright); border-radius: 2px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s;
  }
  .time-pill:hover { color: var(--text); border-color: var(--gold-dim); }
  .time-pill.active { background: var(--gold-dim); color: var(--text); border-color: var(--gold-dim); }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 8px; top: 50%;
    transform: translateY(-50%); opacity: .35;
  }
  #search {
    font-family: 'DM Mono', monospace;
    font-size: .65rem; letter-spacing: .04em;
    background: var(--surface); border: 1px solid var(--border-bright);
    color: var(--text); padding: .28rem .7rem .28rem 26px;
    border-radius: 2px; outline: none; width: 150px;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--gold-dim); }
  #search::placeholder { color: var(--muted); }

  .feed-inner { padding: 1.2rem 1.25rem 5rem; max-width: 760px; }

  .stats {
    display: flex; gap: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .stat { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); }
  .stat strong { display: block; font-size: 1.4rem; color: var(--gold); font-weight: 500; letter-spacing: -.02em; line-height: 1.1; }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: .6rem; color: var(--muted); margin-bottom: .8rem;
  }

  .card {
    display: grid; grid-template-columns: 64px 1fr;
    gap: 1.2rem; padding: 1.2rem 0;
    border-bottom: 1px solid var(--border);
    animation: rise .3s ease both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(5px)} to{opacity:1} }

  .card-time {
    font-family: 'DM Mono', monospace;
    font-size: .58rem; color: var(--muted);
    padding-top: 3px; line-height: 1.8;
  }
  .card-time .t-date { display: block; }
  .card-time .t-time { display: block; color: var(--gold); font-size: .68rem; }

  .card-tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .45rem; }
  .tag {
    font-family: 'DM Mono', monospace; font-size: .58rem;
    padding: .12rem .45rem;
    border: 1px solid rgba(201,168,76,.22);
    color: var(--gold-dim); border-radius: 2px; letter-spacing: .03em;
  }
  .card-body {
    font-size: .8rem; color: #a8a6a0; line-height: 1.85;
  }

  .empty {
    text-align: center; padding: 4rem 0;
    font-family: 'DM Mono', monospace;
    font-size: .75rem; color: var(--muted); line-height: 2;
  }

  /* ── RIGHT: MARKETS ── */
  .market-col {
    width: var(--panel-w); flex-shrink: 0;
    position: sticky; top: 52px;
    height: calc(100vh - 52px);
    overflow-y: auto;
    background: var(--surface);
  }

  .market-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .m-tab {
    font-family: 'DM Mono', monospace;
    font-size: .54rem; letter-spacing: .04em;
    padding: .65rem 0; flex: 1; text-align: center;
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .12s;
  }
  .m-tab:hover { color: var(--text); }
  .m-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .m-panel { display: none; }
  .m-panel.active { display: block; }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: .56rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); padding: .35rem .75rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  .main-chart { height: 260px; }
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .mini-item {
    height: 138px; overflow: hidden;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .mini-item:nth-child(even) { border-right: none; }

  .tradingview-widget-container,
  .tradingview-widget-container__widget { height: 100% !important; }

  /* ── LIVE PANEL ── */
  .live-channels {
    display: flex; flex-wrap: wrap; gap: .3rem;
    padding: .55rem .75rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .live-btn {
    font-family: 'DM Mono', monospace;
    font-size: .58rem; letter-spacing: .04em;
    padding: .25rem .65rem;
    border: 1px solid var(--border-bright); border-radius: 2px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s;
  }
  .live-btn:hover { color: var(--text); border-color: var(--gold-dim); }
  .live-btn.active { background: var(--gold); color: #080810; border-color: var(--gold); font-weight: 500; }

  .live-player {
    position: relative; padding-top: 56.25%; background: #000;
  }
  .live-player iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: none;
  }

  .live-note {
    font-family: 'DM Mono', monospace;
    font-size: .56rem; color: var(--muted);
    padding: .5rem .75rem;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }

  .market-col::-webkit-scrollbar { width: 3px; }
  .market-col::-webkit-scrollbar-track { background: var(--surface); }
  .market-col::-webkit-scrollbar-thumb { background: var(--border-bright); }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); }

  @media (max-width: 960px) { .market-col { display: none; } }
  @media (max-width: 580px) {
    header { padding: 0 .8rem; }
    .filter-wrap { padding: .45rem .8rem; }
    .feed-inner { padding: 1rem .8rem 5rem; }
  }
</style>
</head>

<script>
/* ── NEWS FEED ── */
const DATA_URL = './data.json';
let allItems = [], activeCat = '', activeHrs = 1, searchQ = '';

function parseTime(str) {
  if (!str) return 0;
  return new Date(str.replace(' ','T') + '+08:00').getTime();
}
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'), m =>
    `<mark style="background:rgba(201,168,76,.28);color:#e2c87a;border-radius:2px;padding:0 2px">${m}</mark>`);
}

async function load() {
  try {
    const data = await (await fetch(DATA_URL + '?t=' + Date.now())).json();
    allItems = data.items || [];
    document.getElementById('totalCount').textContent = data.count || 0;
    document.getElementById('updatedAt').innerHTML =
      `<span class="pulse"></span>更新於 ${data.updated || '—'}`;
    buildCats(); render();
  } catch(e) {
    document.getElementById('digestList').innerHTML =
      `<div class="empty">無法載入資料<br>${e.message}</div>`;
  }
}

function buildCats() {
  const counts = new Map();
  allItems.forEach(item => item.tags.forEach(t => counts.set(t,(counts.get(t)||0)+1)));
  const top = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,18);
  const wrap = document.getElementById('filterWrap');
  wrap.querySelectorAll('.cat-btn:not([data-cat=""])').forEach(b => b.remove());
  const pills = wrap.querySelector('.time-pills');
  top.forEach(([name]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat===name ? ' active' : '');
    btn.dataset.cat = name; btn.textContent = name;
    wrap.insertBefore(btn, pills);
  });
}

function render() {
  const now = Date.now();
  const cutoff = activeHrs > 0 ? now - activeHrs*3600000 : 0;
  const filtered = allItems.filter(item => {
    if (cutoff && parseTime(item.time) < cutoff) return false;
    if (activeCat && !item.tags.includes(activeCat)) return false;
    if (searchQ && !item.text.includes(searchQ) && !item.tags.some(t=>t.includes(searchQ))) return false;
    return true;
  });
  document.getElementById('resultsCount').textContent =
    filtered.length < allItems.length ? `顯示 ${filtered.length} 筆` : '';
  const list = document.getElementById('digestList');
  if (!filtered.length) { list.innerHTML='<div class="empty">無符合條件的快訊</div>'; return; }
  list.innerHTML = filtered.map((item,i) => {
    const [dp,tp] = (item.time||'').split(' ');
    const hm = (tp||'').slice(0,5);
    const tags = (item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="card" style="animation-delay:${Math.min(i,20)*.03}s">
      <div class="card-time"><span class="t-date">${dp||'—'}</span><span class="t-time">${hm}</span></div>
      <div>${tags?`<div class="card-tags">${tags}</div>`:''}
        <div class="card-body">${highlight(item.text,searchQ)}</div></div>
    </div>`;
  }).join('');
}

document.getElementById('filterWrap').addEventListener('click', e => {
  const cb = e.target.closest('.cat-btn');
  if (cb) {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    cb.classList.add('active'); activeCat = cb.dataset.cat; render(); return;
  }
  const tp = e.target.closest('.time-pill');
  if (tp) {
    document.querySelectorAll('.time-pill').forEach(b=>b.classList.remove('active'));
    tp.classList.add('active'); activeHrs = parseInt(tp.dataset.h); render();
  }
});
document.getElementById('search').addEventListener('input', e => { searchQ=e.target.value.trim(); render(); });

load();
setInterval(load, 60000);

/* ── MARKET TABS ── */
document.querySelectorAll('.m-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.m-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.m-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    const panelId = 'panel-' + tab.dataset.panel;
    document.getElementById(panelId).classList.add('active');
    // 切到直播 tab 才載入，避免背景自動播放
    if (tab.dataset.panel === 'live') {
      const frame = document.getElementById('liveFrame');
      if (!frame.src.includes('youtube.com')) setLive(activeLiveId);
    }
  });
});

/* ── LIVE CHANNELS ── */
const liveChannels = [
  { name: 'Bloomberg',    id: 'iEpJwprxDdk' },
  { name: 'Yahoo Finance', id: 'YDvsBbKfLPA' },
  { name: 'CNBC',         id: '6_S9nI3YzSs'  },
  { name: 'Fox Business', id: 'wMJAt73KABI'  },
  { name: 'Al Jazeera',   id: 'h3MuIUGApuc'  },
];

let activeLiveId = liveChannels[0].id;

function setLive(id) {
  activeLiveId = id;
  document.getElementById('liveFrame').src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
}

function buildLiveChannels() {
  const wrap = document.getElementById('liveChannels');
  liveChannels.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'live-btn' + (ch.id === activeLiveId ? ' active' : '');
    btn.textContent = ch.name;
    btn.onclick = () => {
      document.querySelectorAll('.live-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setLive(ch.id);
    };
    wrap.appendChild(btn);
  });
}

buildLiveChannels();
</script>
