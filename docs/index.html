<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24HR 財經快訊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07080d;
    --bg2:       #0d0f18;
    --bg3:       #13162200;
    --panel:     #111420;
    --border:    #1e2235;
    --border2:   #252a40;
    --orange:    #ff7b29;
    --orange2:   #ff9a5c;
    --cyan:      #00c8e0;
    --green:     #00e87a;
    --red:       #ff3d5a;
    --yellow:    #ffd94a;
    --text:      #d8d4cc;
    --text2:     #8a8fa8;
    --text3:     #555a72;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Serif TC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    /* subtle scanline texture */
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,.012) 2px,
      rgba(255,255,255,.012) 4px
    );
  }

  /* ── TOPBAR ── */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg2);
    border-bottom: 2px solid var(--orange);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0;
  }

  #logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--bg);
    background: var(--orange);
    padding: 10px 18px;
    letter-spacing: .12em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #ticker-wrap {
    flex: 1;
    overflow: hidden;
    padding: 0 12px;
  }
  #ticker-inner {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: .05em;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
  }
  @keyframes ticker {
    0%   { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  #updated-wrap {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cyan);
    padding: 0 16px;
    white-space: nowrap;
    border-left: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 6px;
    height: 100%;
  }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,232,122,.6); }
    50%       { opacity: .6; box-shadow: 0 0 0 5px rgba(0,232,122,0); }
  }

  /* ── CONTROLS ── */
  #controls {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  /* Search */
  #search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }
  #search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    opacity: .4;
  }
  #search {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 10px 7px 34px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--orange); }
  #search::placeholder { color: var(--text3); }

  /* Time filter pills */
  .pill-group { display: flex; gap: 4px; }
  .pill {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    letter-spacing: .06em;
    transition: all .15s;
    white-space: nowrap;
  }
  .pill:hover      { border-color: var(--orange); color: var(--orange); }
  .pill.active     { background: var(--orange); border-color: var(--orange); color: #000; }

  /* Tag filter */
  #tag-filter {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 2px;
    border: 1px solid transparent;
    background: var(--bg2);
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .05em;
  }
  .tag-btn:hover       { color: var(--text2); border-color: var(--border2); }
  .tag-btn.active      { color: var(--bg); background: var(--cyan); }

  #controls-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: .08em;
    white-space: nowrap;
  }

  #results-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── FEED ── */
  #feed {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 20px 60px;
  }

  .news-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 0 16px;
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    animation: fadeIn .3s ease;
    transition: background .15s;
  }
  .news-item:hover { background: rgba(255,123,41,.03); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .news-meta {
    text-align: right;
    padding-top: 2px;
  }
  .news-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .news-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    opacity: .6;
    margin-top: 2px;
  }

  .news-body {}
  .news-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: .06em;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .tag:hover { opacity: .75; }

  /* Tag colour cycling */
  .tc0 { background: rgba(255,123,41,.18); color: var(--orange2); border: 1px solid rgba(255,123,41,.3); }
  .tc1 { background: rgba(0,200,224,.14); color: var(--cyan);    border: 1px solid rgba(0,200,224,.25); }
  .tc2 { background: rgba(0,232,122,.13); color: var(--green);   border: 1px solid rgba(0,232,122,.22); }
  .tc3 { background: rgba(255,217,74,.13); color: var(--yellow); border: 1px solid rgba(255,217,74,.22); }
  .tc4 { background: rgba(255,61,90,.14); color: var(--red);     border: 1px solid rgba(255,61,90,.25); }

  .news-text {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    word-break: break-word;
  }
  .news-text mark {
    background: rgba(255,123,41,.3);
    color: var(--orange2);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ── EMPTY / LOADING ── */
  #status {
    text-align: center;
    padding: 60px 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: .08em;
  }
  .loading-bar {
    width: 120px; height: 2px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 0;
    overflow: hidden;
  }
  .loading-bar::after {
    content: '';
    display: block;
    width: 40%;
    height: 100%;
    background: var(--orange);
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo">📡 24HR MKT NEWS</div>
  <div id="ticker-wrap">
    <div id="ticker-inner">載入中…</div>
  </div>
  <div id="updated-wrap">
    <div class="pulse"></div>
    <span id="updated-time">—</span>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <!-- Search -->
  <div id="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="搜尋關鍵字…">
  </div>

  <!-- Time filter -->
  <span class="controls-label" style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;">時段</span>
  <div class="pill-group" id="time-pills">
    <button class="pill active" data-h="1">1H</button>
    <button class="pill" data-h="6">6H</button>
    <button class="pill" data-h="24">24H</button>
    <button class="pill" data-h="0">ALL</button>
  </div>

  <!-- Tag filter (populated dynamically) -->
  <span class="controls-label" style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;">標籤</span>
  <div id="tag-filter"></div>

  <div id="results-count"></div>
</div>

<!-- FEED -->
<div id="feed">
  <div id="status">
    載入中
    <div class="loading-bar"></div>
  </div>
</div>

<script>
const DATA_URL = './data.json';
const REFRESH_MS = 5 * 60 * 1000; // 5 min

let allItems  = [];
let activeTag = null;
let activeHrs = 1;
let searchQ   = '';

// ── tag colour map ──
const tagColours = new Map();
const TC = ['tc0','tc1','tc2','tc3','tc4'];
let tcIdx = 0;
function tagClass(name) {
  if (!tagColours.has(name)) tagColours.set(name, TC[tcIdx++ % TC.length]);
  return tagColours.get(name);
}

// ── fetch data ──
async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    allItems = d.items || [];

    document.getElementById('updated-time').textContent = d.updated || '—';

    // ticker
    const sample = allItems.slice(0, 8).map(i => i.text.substring(0, 25) + '…').join('   ▪   ');
    document.getElementById('ticker-inner').textContent = sample;

    buildTagFilter();
    render();
  } catch (e) {
    document.getElementById('status').innerHTML = `⚠ 資料載入失敗：${e.message}`;
  }
}

// ── build tag buttons ──
function buildTagFilter() {
  const counts = new Map();
  allItems.forEach(item => item.tags.forEach(t => counts.set(t, (counts.get(t) || 0) + 1)));
  const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 20);

  const wrap = document.getElementById('tag-filter');
  wrap.innerHTML = '';
  sorted.forEach(([name, cnt]) => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTag === name ? ' active' : '');
    btn.textContent = `${name} (${cnt})`;
    btn.onclick = () => {
      activeTag = (activeTag === name) ? null : name;
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      if (activeTag) btn.classList.add('active');
      render();
    };
    wrap.appendChild(btn);
  });
}

// ── highlight search term ──
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

// ── parse time ──
function parseTime(str) {
  // "2026-03-19 14:30:00"
  if (!str) return 0;
  return new Date(str.replace(' ', 'T') + '+08:00').getTime();
}

// ── main render ──
function render() {
  const now = Date.now();
  const cutoff = activeHrs > 0 ? now - activeHrs * 3600 * 1000 : 0;

  const filtered = allItems.filter(item => {
    if (cutoff && parseTime(item.time) < cutoff) return false;
    if (activeTag && !item.tags.includes(activeTag)) return false;
    if (searchQ && !item.text.includes(searchQ) && !item.tags.some(t => t.includes(searchQ))) return false;
    return true;
  });

  document.getElementById('results-count').textContent = `共 ${filtered.length} 筆`;

  const feed = document.getElementById('feed');
  if (!filtered.length) {
    feed.innerHTML = '<div id="status">無符合條件的快訊</div>';
    return;
  }

  feed.innerHTML = filtered.map(item => {
    const dt = item.time || '';
    const datePart = dt.split(' ')[0] || '';
    const timePart = dt.split(' ')[1] || '';

    const tagsHtml = item.tags.map(t =>
      `<span class="tag ${tagClass(t)}" onclick="filterTag('${t}')">${t}</span>`
    ).join('');

    return `
<div class="news-item">
  <div class="news-meta">
    <div class="news-time">${timePart}</div>
    <div class="news-date">${datePart}</div>
  </div>
  <div class="news-body">
    <div class="news-tags">${tagsHtml}</div>
    <div class="news-text">${highlight(item.text, searchQ)}</div>
  </div>
</div>`;
  }).join('');
}

// ── global for inline onclick ──
function filterTag(name) {
  activeTag = (activeTag === name) ? null : name;
  document.querySelectorAll('.tag-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(name + ' '));
  });
  render();
}

// ── wire controls ──
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

document.getElementById('time-pills').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeHrs = parseInt(btn.dataset.h);
  render();
});

// ── init & auto-refresh ──
loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
