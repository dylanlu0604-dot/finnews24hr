<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24HR MKT NEWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #080810;
    --surface:      #0f0f1a;
    --border:       #1c1c2e;
    --border-bright:#2a2a40;
    --gold:         #c9a84c;
    --gold-dim:     #8a6e30;
    --text:         #e2e0d8;
    --muted:        #5a5a72;
    --green:        #4cc97a;
    --live-w:       320px;
    --chart-w:      360px;
    --header-h:     52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 300;
    background: rgba(8,8,16,.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex; align-items: center;
    padding: 0 1.25rem; gap: 1.2rem;
  }
  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: .85rem; font-weight: 500;
    letter-spacing: .14em; color: var(--gold); flex-shrink: 0;
  }
  .wordmark em { color: var(--muted); font-style: normal; }

  .updated {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; color: var(--muted); letter-spacing: .04em;
    margin-left: auto;
  }
  .pulse {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--green);
    margin-right: 5px; animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── BODY ── */
  .body-wrap {
    display: flex;
    position: fixed;
    top: var(--header-h); left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  /* ════════════════
     LEFT — LIVE
  ════════════════ */
  .live-col {
    width: var(--live-w); flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .col-header {
    font-family: 'DM Mono', monospace;
    font-size: .58rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted);
    padding: .38rem .85rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .live-item {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .live-divider {
    height: 1px; flex-shrink: 0;
    background: var(--border);
  }

  .live-player {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 0;
  }
  .live-player iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: none;
  }

  /* ════════════════
     CENTER — NEWS
  ════════════════ */
  .news-col {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .filter-wrap {
    display: flex; flex-wrap: wrap; gap: .3rem; align-items: center;
    padding: .45rem .9rem;
    background: rgba(8,8,16,.95);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cat-btn {
    font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .04em;
    padding: .24rem .6rem;
    border: 1px solid var(--border-bright); border-radius: 2px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s;
  }
  .cat-btn:hover { color: var(--text); border-color: var(--gold-dim); }
  .cat-btn.active { background: var(--gold); color: #080810; border-color: var(--gold); font-weight: 500; }

  .time-pills { display: flex; gap: .22rem; align-items: center; margin-left: auto; }
  .time-pill {
    font-family: 'DM Mono', monospace;
    font-size: .56rem; letter-spacing: .06em;
    padding: .2rem .5rem;
    border: 1px solid var(--border-bright); border-radius: 2px;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s;
  }
  .time-pill:hover { color: var(--text); border-color: var(--gold-dim); }
  .time-pill.active { background: var(--gold-dim); color: var(--text); border-color: var(--gold-dim); }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 7px; top: 50%;
    transform: translateY(-50%); opacity: .32;
  }
  #search {
    font-family: 'DM Mono', monospace;
    font-size: .6rem; letter-spacing: .04em;
    background: var(--bg); border: 1px solid var(--border-bright);
    color: var(--text); padding: .22rem .6rem .22rem 24px;
    border-radius: 2px; outline: none; width: 130px;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--gold-dim); }
  #search::placeholder { color: var(--muted); }

  .feed-scroll {
    flex: 1; overflow-y: auto;
    padding: 1rem 1.1rem 2rem;
  }

  .stats {
    display: flex; gap: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.2rem;
  }
  .stat { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); }
  .stat strong { display: block; font-size: 1.3rem; color: var(--gold); font-weight: 500; letter-spacing: -.02em; line-height: 1.1; }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: .56rem; color: var(--muted); margin-bottom: .7rem;
  }

  .card {
    display: grid; grid-template-columns: 58px 1fr;
    gap: 1rem; padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    animation: rise .3s ease both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(4px)} to{opacity:1} }

  .card-time {
    font-family: 'DM Mono', monospace;
    font-size: .55rem; color: var(--muted);
    padding-top: 2px; line-height: 1.8;
  }
  .card-time .t-date { display: block; }
  .card-time .t-time { display: block; color: var(--gold); font-size: .64rem; }

  .card-tags { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .4rem; }
  .tag {
    font-family: 'DM Mono', monospace; font-size: .54rem;
    padding: .1rem .4rem;
    border: 1px solid rgba(201,168,76,.2);
    color: var(--gold-dim); border-radius: 2px;
  }
  .card-body { font-size: .78rem; color: #a8a6a0; line-height: 1.82; }

  .empty {
    text-align: center; padding: 3rem 0;
    font-family: 'DM Mono', monospace;
    font-size: .7rem; color: var(--muted); line-height: 2;
  }

  .feed-scroll::-webkit-scrollbar { width: 3px; }
  .feed-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* ════════════════
     RIGHT — CHARTS
  ════════════════ */
  .chart-col {
    width: var(--chart-w); flex-shrink: 0;
    display: flex; flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .market-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .m-tab {
    font-family: 'DM Mono', monospace;
    font-size: .52rem; letter-spacing: .04em;
    padding: .6rem 0; flex: 1; text-align: center;
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .12s;
  }
  .m-tab:hover { color: var(--text); }
  .m-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .chart-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
  }
  .chart-body::-webkit-scrollbar { width: 3px; }
  .chart-body::-webkit-scrollbar-track { background: var(--surface); }
  .chart-body::-webkit-scrollbar-thumb { background: var(--border-bright); }

  .m-panel { display: none; }
  .m-panel.active { display: block; }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: .52rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); padding: .32rem .7rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  .main-chart { height: 240px; overflow: hidden; }
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .mini-item {
    height: 130px; overflow: hidden;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .mini-item:nth-child(even) { border-right: none; }

  .tradingview-widget-container,
  .tradingview-widget-container__widget { height: 100% !important; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) { .live-col { display: none; } }
  @media (max-width: 820px)  { .chart-col { display: none; } }
</style>
</head>

/* ── NEWS FEED ── */
const DATA_URL = './data.json';
let allItems = [], activeCat = '', activeHrs = 1, searchQ = '';

function parseTime(str) {
  if (!str) return 0;
  return new Date(str.replace(' ','T') + '+08:00').getTime();
}
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'), m =>
    `<mark style="background:rgba(201,168,76,.28);color:#e2c87a;border-radius:2px;padding:0 2px">${m}</mark>`);
}

async function load() {
  try {
    const data = await (await fetch(DATA_URL + '?t=' + Date.now())).json();
    allItems = data.items || [];
    document.getElementById('totalCount').textContent = data.count || 0;
    document.getElementById('updatedAt').innerHTML =
      `<span class="pulse"></span>更新於 ${data.updated || '—'}`;
    buildCats(); render();
  } catch(e) {
    document.getElementById('digestList').innerHTML =
      `<div class="empty">無法載入資料<br>${e.message}</div>`;
  }
}

function buildCats() {
  const counts = new Map();
  allItems.forEach(item => item.tags.forEach(t => counts.set(t,(counts.get(t)||0)+1)));
  const top = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,16);
  const wrap = document.getElementById('filterWrap');
  wrap.querySelectorAll('.cat-btn:not([data-cat=""])').forEach(b => b.remove());
  const pills = wrap.querySelector('.time-pills');
  top.forEach(([name]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat===name ? ' active' : '');
    btn.dataset.cat = name; btn.textContent = name;
    wrap.insertBefore(btn, pills);
  });
}

function render() {
  const now = Date.now();
  const cutoff = activeHrs > 0 ? now - activeHrs*3600000 : 0;
  const filtered = allItems.filter(item => {
    if (cutoff && parseTime(item.time) < cutoff) return false;
    if (activeCat && !item.tags.includes(activeCat)) return false;
    if (searchQ && !item.text.includes(searchQ) && !item.tags.some(t=>t.includes(searchQ))) return false;
    return true;
  });
  document.getElementById('resultsCount').textContent =
    filtered.length < allItems.length ? `顯示 ${filtered.length} 筆` : '';
  const list = document.getElementById('digestList');
  if (!filtered.length) { list.innerHTML='<div class="empty">無符合條件的快訊</div>'; return; }
  list.innerHTML = filtered.map((item,i) => {
    const [dp,tp] = (item.time||'').split(' ');
    const hm = (tp||'').slice(0,5);
    const tags = (item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="card" style="animation-delay:${Math.min(i,20)*.03}s">
      <div class="card-time"><span class="t-date">${dp||'—'}</span><span class="t-time">${hm}</span></div>
      <div>${tags?`<div class="card-tags">${tags}</div>`:''}
        <div class="card-body">${highlight(item.text,searchQ)}</div></div>
    </div>`;
  }).join('');
}

document.getElementById('filterWrap').addEventListener('click', e => {
  const cb = e.target.closest('.cat-btn');
  if (cb) {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    cb.classList.add('active'); activeCat = cb.dataset.cat; render(); return;
  }
  const tp = e.target.closest('.time-pill');
  if (tp) {
    document.querySelectorAll('.time-pill').forEach(b=>b.classList.remove('active'));
    tp.classList.add('active'); activeHrs = parseInt(tp.dataset.h); render();
  }
});
document.getElementById('search').addEventListener('input', e => { searchQ=e.target.value.trim(); render(); });

load();
setInterval(load, 60000);

/* ── CHART TABS ── */
document.querySelectorAll('.m-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.m-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.m-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.panel).classList.add('active');
  });
});

</script>
</body>
</html>
