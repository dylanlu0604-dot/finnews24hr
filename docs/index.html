<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24HR MKT NEWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement(
    { pageLanguage: 'zh-TW', includedLanguages: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE },
    'google_translate_element'
  );
}
</script>
<style>
  :root {
    --bg:           #080810;
    --surface:      #0f0f1a;
    --border:       #1c1c2e;
    --border-bright:#2a2a40;
    --gold:         #c9a84c;
    --gold-dim:     #8a6e30;
    --text:         #e2e0d8;
    --muted:        #5a5a72;
    --green:        #4cc97a;
    --red:          #e05555;
    --live-w:       320px;
    --chart-w:      360px;
    --ticker-h:     28px;
    --header-h:     52px;
    --top-h:        80px; /* ticker + header */
  }

  /* ── TICKER TAPE ── */
  #ticker-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 400;
    height: var(--ticker-h);
    background: #050508;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    display: flex; align-items: center;
  }
  #ticker-track {
    display: flex; align-items: center;
    white-space: nowrap;
    animation: ticker-scroll 60s linear infinite;
  }
  #ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-content {
    display: inline-flex; align-items: center; gap: 0;
    padding-right: 40px;
  }
  .t-item {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .04em;
    padding: 0 20px; border-right: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 8px;
    height: var(--ticker-h);
  }
  .t-name  { color: var(--muted); }
  .t-price { color: var(--text); font-weight: 500; }
  .t-chg.up { color: var(--green); }
  .t-chg.dn { color: var(--red); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: var(--ticker-h); left: 0; right: 0; z-index: 300;
    background: rgba(8,8,16,.96); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h); display: flex; align-items: center;
    padding: 0 1.25rem; gap: 1.2rem;
  }
  .wordmark { font-family: 'DM Mono', monospace; font-size: .85rem; font-weight: 500; letter-spacing: .14em; color: var(--gold); flex-shrink: 0; }
  .wordmark em { color: var(--muted); font-style: normal; }

  /* Google Translate */
  #google_translate_element { flex-shrink: 0; }
  #google_translate_element .goog-te-gadget-simple {
    background: transparent !important;
    border: 1px solid var(--border-bright) !important;
    border-radius: 3px !important;
    padding: 2px 6px !important;
  }
  #google_translate_element .goog-te-gadget-simple span,
  #google_translate_element .goog-te-gadget-simple a {
    font-family: 'DM Mono', monospace !important;
    font-size: .6rem !important;
    color: var(--muted) !important;
    text-decoration: none !important;
  }
  #google_translate_element .goog-te-gadget-simple .goog-te-menu-value span { color: var(--gold) !important; }
  .goog-te-banner-frame { display: none !important; }
  body { top: 0 !important; }
  .updated { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); letter-spacing: .04em; margin-left: auto; }
  .pulse { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ── BODY ── */
  .body-wrap { display: flex; position: fixed; top: var(--top-h); left: 0; right: 0; bottom: 0; z-index: 1; }

  /* ════ LEFT — LIVE ════ */
  .live-col { width: var(--live-w); flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--surface); overflow: hidden; }
  .col-header { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: .38rem .85rem; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .live-item { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .live-divider { height: 1px; flex-shrink: 0; background: var(--border); }
  .live-player { flex: 1; position: relative; background: #000; min-height: 0; }
  .live-player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

  /* ════ CENTER — NEWS ════ */
  .news-col { flex: 1; min-width: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .filter-wrap { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; padding: .45rem .9rem; background: rgba(8,8,16,.95); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .cat-btn { font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .04em; padding: .24rem .6rem; border: 1px solid var(--border-bright); border-radius: 2px; background: transparent; color: var(--muted); cursor: pointer; transition: all .12s; }
  .cat-btn:hover { color: var(--text); border-color: var(--gold-dim); }
  .cat-btn.active { background: var(--gold); color: #080810; border-color: var(--gold); font-weight: 500; }
  .time-pills { display: flex; gap: .22rem; align-items: center; margin-left: auto; }
  .time-pill { font-family: 'DM Mono', monospace; font-size: .56rem; letter-spacing: .06em; padding: .2rem .5rem; border: 1px solid var(--border-bright); border-radius: 2px; background: transparent; color: var(--muted); cursor: pointer; transition: all .12s; }
  .time-pill:hover { color: var(--text); border-color: var(--gold-dim); }
  .time-pill.active { background: var(--gold-dim); color: var(--text); border-color: var(--gold-dim); }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 7px; top: 50%; transform: translateY(-50%); opacity: .32; }
  #search { font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .04em; background: var(--bg); border: 1px solid var(--border-bright); color: var(--text); padding: .22rem .6rem .22rem 24px; border-radius: 2px; outline: none; width: 130px; transition: border-color .15s; }
  #search:focus { border-color: var(--gold-dim); }
  #search::placeholder { color: var(--muted); }
  .feed-scroll { flex: 1; overflow-y: auto; padding: 1rem 1.1rem 2rem; }
  .stats { display: flex; gap: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.2rem; }
  .stat { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); }
  .stat strong { display: block; font-size: 1.3rem; color: var(--gold); font-weight: 500; letter-spacing: -.02em; line-height: 1.1; }
  .results-count { font-family: 'DM Mono', monospace; font-size: .56rem; color: var(--muted); margin-bottom: .7rem; }
  .card { display: grid; grid-template-columns: 58px 1fr; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); animation: rise .3s ease both; }
  @keyframes rise { from{opacity:0;transform:translateY(4px)} to{opacity:1} }
  .card-time { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--muted); padding-top: 2px; line-height: 1.8; }
  .card-time .t-date { display: block; }
  .card-time .t-time { display: block; color: var(--gold); font-size: .64rem; }
  .card-tags { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .4rem; }
  .tag { font-family: 'DM Mono', monospace; font-size: .54rem; padding: .1rem .4rem; border: 1px solid rgba(201,168,76,.2); color: var(--gold-dim); border-radius: 2px; }
  .card-body { font-size: .78rem; color: #a8a6a0; line-height: 1.82; }
  .empty { text-align: center; padding: 3rem 0; font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); line-height: 2; }
  .feed-scroll::-webkit-scrollbar { width: 3px; }
  .feed-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* ════ RIGHT — CHARTS ════ */
  .chart-col { width: var(--chart-w); flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
  .market-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .m-tab { font-family: 'DM Mono', monospace; font-size: .52rem; letter-spacing: .04em; padding: .6rem 0; flex: 1; text-align: center; background: transparent; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .12s; }
  .m-tab:hover { color: var(--text); }
  .m-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .market-updated { font-family: 'DM Mono', monospace; font-size: .5rem; color: var(--muted); padding: .25rem .7rem; background: var(--bg); border-bottom: 1px solid var(--border); }
  .chart-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .chart-body::-webkit-scrollbar { width: 3px; }
  .chart-body::-webkit-scrollbar-track { background: var(--surface); }
  .chart-body::-webkit-scrollbar-thumb { background: var(--border-bright); }
  .m-panel { display: none; }
  .m-panel.active { display: block; }
  .chart-label { font-family: 'DM Mono', monospace; font-size: .52rem; letter-spacing: .08em; color: var(--muted); padding: .32rem .7rem; background: var(--bg); border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
  .main-chart { height: 240px; position: relative; }
  .chart-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: .56rem; color: var(--muted); }

  /* Mini cards */
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .mini-item { height: 110px; overflow: hidden; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; padding: 7px 8px 0; }
  .mini-item:nth-child(even) { border-right: none; }
  .mini-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1px; }
  .mini-name  { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--text); font-weight: 500; letter-spacing: .02em; }
  .mini-chg   { font-family: 'DM Mono', monospace; font-size: .52rem; }
  .mini-price { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--text); margin-bottom: 2px; letter-spacing: -.01em; }
  .mini-chart-area { flex: 1; min-height: 0; }
  .up { color: var(--green); }
  .dn { color: var(--red); }

  @media (max-width: 1100px) { .live-col { display: none; } }
  @media (max-width: 820px)  { .chart-col { display: none; } }
</style>
</head>
<body>

<!-- ── TICKER TAPE ── -->
<div id="ticker-bar">
  <div id="ticker-track">
    <div id="ticker-inner" class="ticker-content">載入行情中…</div>
    <div id="ticker-clone"  class="ticker-content" aria-hidden="true"></div>
  </div>
</div>

<header>
  <div class="wordmark">24HR<em>/</em>MKT NEWS</div>
  <div id="google_translate_element"></div>
  <div class="updated" id="updatedAt"><span class="pulse"></span>載入中…</div>
</header>

<div class="body-wrap">

  <!-- ══ LEFT: LIVE ══ -->
  <div class="live-col">
    <div class="live-item">
      <div class="col-header">▶ Bloomberg</div>
      <div class="live-player">
        <iframe src="https://www.youtube.com/embed/iEpJwprxDdk?autoplay=1&mute=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
    <div class="live-divider"></div>
    <div class="live-item">
      <div class="col-header">▶ Yahoo Finance</div>
      <div class="live-player">
        <iframe src="https://www.youtube.com/embed/YDvsBbKfLPA?autoplay=1&mute=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>

  </div>

  <!-- ══ CENTER: NEWS ══ -->
  <div class="news-col">
    <div class="filter-wrap" id="filterWrap">
      <button class="cat-btn active" data-cat="">全部</button>
      <div class="time-pills">
        <span style="font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);letter-spacing:.06em">時段</span>
        <button class="time-pill" data-h="1">1H</button>
        <button class="time-pill" data-h="6">6H</button>

        <button class="time-pill active" data-h="0">ALL</button>

  <div class="chart-col">

      <button class="m-tab active" data-panel="equity">指數</button>
      <button class="m-tab" data-panel="fx">匯率</button>
      <button class="m-tab" data-panel="bond">債券</button>

      <div class="m-panel" id="panel-fx">
        <div class="chart-label" id="ml-fx">DXY 美元指數 — 載入中</div>
        <div class="main-chart" id="mc-fx"><div class="chart-loading">載入中…</div></div>

      <div class="m-panel" id="panel-bond">
        <div class="chart-label" id="ml-bond">US 10Y 殖利率 — 載入中</div>
        <div class="main-chart" id="mc-bond"><div class="chart-loading">載入中…</div></div>
        <div class="chart-label">殖利率概覽</div>
        <div class="mini-grid" id="mg-bond"></div>
      </div>

      <div class="m-panel" id="panel-commodity">
        <div class="chart-label" id="ml-commodity">WTI 原油 — 載入中</div>
        <div class="main-chart" id="mc-commodity"><div class="chart-loading">載入中…</div></div>
        <div class="chart-label">原物料概覽</div>
        <div class="mini-grid" id="mg-commodity"></div>
      </div>

    </div>
  </div>

</div>

<script>
/* ════════════════════════════════
   NEWS FEED
════════════════════════════════ */
const DATA_URL   = './data.json';
const MARKET_URL = './market.json';
let allItems = [], activeCat = '', activeHrs = 0, searchQ = '';

function parseTime(str) {
  if (!str) return 0;
  return new Date(str.replace(' ','T') + '+08:00').getTime();
}
function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'), m =>
    `<mark style="background:rgba(201,168,76,.28);color:#e2c87a;border-radius:2px;padding:0 2px">${m}</mark>`);
}

async function loadNews() {
  try {
    const data = await (await fetch(DATA_URL + '?t=' + Date.now())).json();
    allItems = data.items || [];
    document.getElementById('totalCount').textContent = data.count || 0;
    document.getElementById('updatedAt').innerHTML =
      `<span class="pulse"></span>更新於 ${data.updated || '—'}`;
    buildCats(); render();
  } catch(e) {
    document.getElementById('digestList').innerHTML =
      `<div class="empty">無法載入資料<br>${e.message}</div>`;
  }
}

function buildCats() {
  const counts = new Map();
  allItems.forEach(item => item.tags.forEach(t => counts.set(t,(counts.get(t)||0)+1)));
  const top = [...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,16);
  const wrap = document.getElementById('filterWrap');
  wrap.querySelectorAll('.cat-btn:not([data-cat=""])').forEach(b => b.remove());
  const pills = wrap.querySelector('.time-pills');
  top.forEach(([name]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCat===name ? ' active' : '');
    btn.dataset.cat = name; btn.textContent = name;
    wrap.insertBefore(btn, pills);
  });
}

function render() {
  const now = Date.now();
  const cutoff = activeHrs > 0 ? now - activeHrs*3600000 : 0;
  const filtered = allItems.filter(item => {
    if (cutoff && parseTime(item.time) < cutoff) return false;
    if (activeCat && !item.tags.includes(activeCat)) return false;
    if (searchQ && !item.text.includes(searchQ) && !item.tags.some(t=>t.includes(searchQ))) return false;
    return true;
  });
  document.getElementById('resultsCount').textContent =
    filtered.length < allItems.length ? `顯示 ${filtered.length} 筆` : '';
  const list = document.getElementById('digestList');
  if (!filtered.length) { list.innerHTML='<div class="empty">無符合條件的快訊</div>'; return; }
  list.innerHTML = filtered.map((item,i) => {
    const [dp,tp] = (item.time||'').split(' ');
    const hm = (tp||'').slice(0,5);
    const tags = (item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="card" style="animation-delay:${Math.min(i,20)*.03}s">
      <div class="card-time"><span class="t-date">${dp||'—'}</span><span class="t-time">${hm}</span></div>
      <div>${tags?`<div class="card-tags">${tags}</div>`:''}
        <div class="card-body">${highlight(item.text,searchQ)}</div></div>
    </div>`;
  }).join('');
}

document.getElementById('filterWrap').addEventListener('click', e => {
  const cb = e.target.closest('.cat-btn');
  if (cb) {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    cb.classList.add('active'); activeCat = cb.dataset.cat; render(); return;
  }
  const tp = e.target.closest('.time-pill');
  if (tp) {
    document.querySelectorAll('.time-pill').forEach(b=>b.classList.remove('active'));
    tp.classList.add('active'); activeHrs = parseInt(tp.dataset.h); render();
  }
});
document.getElementById('search').addEventListener('input', e => { searchQ=e.target.value.trim(); render(); });
loadNews();
setInterval(loadNews, 60000);

/* ════════════════════════════════
   CHARTS — reads local market.json (no CORS)
════════════════════════════════ */
const LW_BASE = {
  layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5a5a72', fontSize: 10 },
  grid: { vertLines: { color: '#1c1c2e' }, horzLines: { color: '#1c1c2e' } },
  timeScale: { borderColor: '#2a2a40', timeVisible: true, secondsVisible: false, fixRightEdge: true },
  rightPriceScale: { borderColor: '#2a2a40' },
  crosshair: { mode: 1 },
};

let marketCache = null;
const createdCharts = {};

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return n >= 1000 ? n.toLocaleString('en-US', { maximumFractionDigits: 2 }) :
         n >= 10   ? n.toFixed(2) : n.toFixed(4);
}

function changePct(price, prev) {
  if (!price || !prev) return { str: '—', cls: '' };
  const p = ((price - prev) / prev) * 100;
  return { str: (p >= 0 ? '+' : '') + p.toFixed(2) + '%', cls: p >= 0 ? 'up' : 'dn' };
}

function buildChart(container, bars, type = 'candle') {
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    ...LW_BASE,
    width: container.clientWidth,
    height: container.clientHeight,
  });

  if (type === 'candle') {
    const s = chart.addCandlestickSeries({
      upColor: '#4cc97a', downColor: '#e05555',
      borderUpColor: '#4cc97a', borderDownColor: '#e05555',
      wickUpColor: '#4cc97a', wickDownColor: '#e05555',
    });
    s.setData(bars.map(b => ({ time: b.t, open: b.o, high: b.h, low: b.l, close: b.c })));
  } else {
    const isUp = bars.length < 2 || bars[bars.length-1].c >= bars[0].c;
    const s = chart.addAreaSeries({
      lineColor: isUp ? '#4cc97a' : '#e05555',
      topColor: isUp ? 'rgba(76,201,122,.18)' : 'rgba(224,85,85,.18)',
      bottomColor: 'transparent',
      lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
    });
    s.setData(bars.map(b => ({ time: b.t, value: b.c })));
  }

  chart.timeScale().fitContent();
  new ResizeObserver(() => chart.applyOptions({
    width: container.clientWidth, height: container.clientHeight
  })).observe(container);
  return chart;
}

function renderPanel(panelId, marketData) {
  const cfg = marketData.panels[panelId];
  if (!cfg) return;
  const symData = marketData.data;

  // Main chart
  const mainSym = cfg.main.symbol;
  const mainEl  = document.getElementById(`mc-${panelId}`);
  const labelEl = document.getElementById(`ml-${panelId}`);
  const sd = symData[mainSym];

  if (sd && sd.bars?.length && mainEl) {
    const chg = changePct(sd.price, sd.prev_close);
    if (labelEl) labelEl.innerHTML =
      `${cfg.main.name} &nbsp;<span style="color:var(--text)">${fmt(sd.price)}</span>&nbsp;<span class="${chg.cls}">${chg.str}</span>`;
    if (createdCharts[`main-${panelId}`]) {
      try { createdCharts[`main-${panelId}`].remove(); } catch(e) {}
    }
    createdCharts[`main-${panelId}`] = buildChart(mainEl, sd.bars, 'candle');
  } else if (mainEl) {
    mainEl.innerHTML = '<div class="chart-loading">無資料</div>';
  }

  // Mini grid
  const gridEl = document.getElementById(`mg-${panelId}`);
  if (!gridEl) return;
  gridEl.innerHTML = '';

  cfg.minis.forEach((mini) => {
    const card = document.createElement('div');
    card.className = 'mini-item';

    const md = symData[mini.symbol];
    if (!md) {
      card.innerHTML = `<div class="mini-info"><span class="mini-name">${mini.name}</span></div><div class="mini-price">無資料</div>`;
      gridEl.appendChild(card);
      return;
    }

    const chg = changePct(md.price, md.prev_close);
    card.innerHTML = `
      <div class="mini-info">
        <span class="mini-name">${mini.name}</span>
        <span class="mini-chg ${chg.cls}">${chg.str}</span>
      </div>
      <div class="mini-price">${fmt(md.price)}</div>
      <div class="mini-chart-area" style="flex:1;min-height:0"></div>`;
    gridEl.appendChild(card);

    if (md.bars?.length) {
      const areaEl = card.querySelector('.mini-chart-area');
      requestAnimationFrame(() => {
        const mc = LightweightCharts.createChart(areaEl, {
          ...LW_BASE,
          width: areaEl.clientWidth, height: areaEl.clientHeight,
          timeScale: { visible: false },
          rightPriceScale: { visible: false },
          leftPriceScale:  { visible: false },
          grid: { vertLines: { visible: false }, horzLines: { visible: false } },
          crosshair: { mode: 0 },
          handleScroll: false, handleScale: false,
        });
        const isUp = chg.cls === 'up';
        const as = mc.addAreaSeries({
          lineColor: isUp ? '#4cc97a' : '#e05555',
          topColor:  isUp ? 'rgba(76,201,122,.15)' : 'rgba(224,85,85,.15)',
          bottomColor: 'transparent',
          lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
        });
        as.setData(md.bars.map(b => ({ time: b.t, value: b.c })));
        mc.timeScale().fitContent();
        new ResizeObserver(() => mc.applyOptions({
          width: areaEl.clientWidth, height: areaEl.clientHeight
        })).observe(areaEl);
      });
    }
  });
}

async function loadMarket() {
  try {
    const data = await (await fetch(MARKET_URL + '?t=' + Date.now())).json();
    marketCache = data;
    document.getElementById('marketUpdated').textContent = `報價更新：${data.updated || '—'}（每 5 分鐘）`;
    buildTicker(data);
    // Render active panel immediately
    const activePanel = document.querySelector('.m-tab.active')?.dataset.panel || 'equity';
    renderPanel(activePanel, data);
  } catch(e) {
    document.getElementById('marketUpdated').textContent = '報價載入失敗';
    console.warn('market.json load error:', e.message);
  }
}

// ── Ticker Tape ──
function buildTicker(data) {
  const TICKER_SYMBOLS = [
    { symbol: "ES=F",      label: "S&P Fut" },
    { symbol: "NQ=F",      label: "NQ Fut" },
    { symbol: "YM=F",      label: "Dow Fut" },
    { symbol: "FDAX=F",    label: "DAX Fut" },
    { symbol: "^VIX",      label: "VIX" },
    { symbol: "CL=F",      label: "WTI" },
    { symbol: "BZ=F",      label: "Brent" },
    { symbol: "GC=F",      label: "Gold" },
    { symbol: "SI=F",      label: "Silver" },
    { symbol: "HG=F",      label: "Copper" },
    { symbol: "NG=F",      label: "Nat Gas" },
    { symbol: "DX-Y.NYB",  label: "DXY" },
    { symbol: "EURUSD=X",  label: "EUR/USD" },
    { symbol: "JPY=X",     label: "USD/JPY" },
    { symbol: "GBPUSD=X",  label: "GBP/USD" },
    { symbol: "USDCNH=X",  label: "USD/CNH" },
    { symbol: "^TNX",      label: "US 10Y" },
    { symbol: "^TYX",      label: "US 30Y" },
    { symbol: "DE10YT=RR", label: "DE 10Y" },
  ];
  const html = TICKER_SYMBOLS.map(t => {
    const d = data.data?.[t.symbol];
    if (!d) return "";
    const price = d.price; const prev = d.prev_close;
    const chg = (!price || !prev) ? { str: "—", cls: "" } : (() => {
      const p = ((price - prev) / prev) * 100;
      return { str: (p >= 0 ? "▲" : "▼") + Math.abs(p).toFixed(2) + "%", cls: p >= 0 ? "up" : "dn" };
    })();
    const priceStr = price >= 1000 ? price.toLocaleString("en-US", {maximumFractionDigits: 2}) : price >= 10 ? price.toFixed(2) : price.toFixed(4);
    return `<span class="t-item"><span class="t-name">${t.label}</span><span class="t-price">${priceStr}</span><span class="t-chg ${chg.cls}">${chg.str}</span></span>`;
  }).join("");
  document.getElementById("ticker-inner").innerHTML = html;
  document.getElementById("ticker-clone").innerHTML = html;
}

// Tab switching
document.querySelectorAll('.m-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.m-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panelId = tab.dataset.panel;
    document.getElementById('panel-' + panelId).classList.add('active');
    if (marketCache) renderPanel(panelId, marketCache);
  });
});

loadMarket();
setInterval(loadMarket, 5 * 60 * 1000);
</script>
